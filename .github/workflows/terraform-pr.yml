name: Terraform Validate (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main"]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-*.yml"

permissions: {}

concurrency:
  group: terraform-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Verify checked out revision
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.15.8

      - name: Terraform Format
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Terraform Init (credential-free)
        run: terraform -chdir=infra/terraform init -backend=false -lockfile=readonly

      - name: Terraform Validate
        run: terraform -chdir=infra/terraform validate -no-color

      - name: Trust-boundary policy
        run: infra/terraform/check-policy.sh
