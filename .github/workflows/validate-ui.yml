name: Validate UI

permissions: {}

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main"]
    paths:
      - "site/**"
      - ".github/workflows/**"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: validate-ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: site
        run: pnpm i --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: site
        run: pnpm exec playwright install chromium

      - name: Set up environment variables
        working-directory: site
        run: |
          echo "PUBLIC_SITE_URL=https://briananderson.xyz" > .env
          echo "PUBLIC_POSTHOG_KEY=${{ secrets.PUBLIC_POSTHOG_KEY }}" >> .env
          echo "PUBLIC_POSTHOG_HOST=${{ secrets.PUBLIC_POSTHOG_HOST }}" >> .env

      - name: Lint
        working-directory: site
        run: pnpm run lint

      - name: Run TypeScript check
        working-directory: site
        run: pnpm run check

      - name: Validate GitHub Actions policy
        working-directory: site
        run: pnpm run test:workflow-policy

      - name: Run unit tests
        working-directory: site
        run: pnpm run test:unit

      - name: Build site
        working-directory: site
        run: pnpm run build

      - name: Run E2E tests (Local)
        working-directory: site
        env:
          CI_USE_LOCAL_SERVER: true
        run: pnpm run test:e2e

      - name: Run UI validation tests
        working-directory: site
        run: pnpm run test:ui

      - name: Run PostHog validation tests
        working-directory: site
        run: pnpm run test:posthog

      - name: Run AI evals
        working-directory: site
        continue-on-error: true
        env:
          AI_EVAL_REPORT_PATH: artifacts/ai-evals-pr.json
        run: pnpm run test:ai

      - name: Upload AI eval report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ai-eval-report
          path: site/artifacts/ai-evals-pr.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload build output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-output
          path: site/build/
          retention-days: 7

      - name: Test print functionality
        run: |
          # Check for print-specific classes
          if grep -q "print:" site/build/resume/index.html; then
            echo "✓ Print styles found in resume.html"
          else
            echo "✗ Print styles not found in resume.html"
            exit 1
          fi

          echo "✓ All print functionality checks passed"
