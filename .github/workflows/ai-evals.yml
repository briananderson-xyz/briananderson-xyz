name: AI Evals

permissions: {}

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Full eval target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - production
          - custom
      custom_base_url:
        description: "Custom AI base URL, e.g. http://127.0.0.1:5173/api"
        required: false
        type: string
      judge_provider:
        description: "Optional judge provider"
        required: false
        default: "openai"
        type: choice
        options:
          - none
          - openai
          - anthropic
      judge_model:
        description: "Optional judge model name"
        required: false
        default: "gpt-5-mini"
        type: string

jobs:
  run-ai-evals:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: site
        run: pnpm i --frozen-lockfile

      - name: Resolve AI eval target
        id: target
        env:
          TARGET: ${{ github.event.inputs.target }}
          CUSTOM_BASE_URL: ${{ github.event.inputs.custom_base_url }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const target = process.env.TARGET;
          const customBaseUrl = process.env.CUSTOM_BASE_URL || '';
          let baseUrl;

          if (target === 'custom') {
            if (!customBaseUrl) {
              throw new Error('custom_base_url is required when target=custom');
            }
            if (/[\r\n]/.test(customBaseUrl)) {
              throw new Error('custom_base_url must be a single-line URL');
            }
            const parsed = new URL(customBaseUrl);
            if (!['http:', 'https:'].includes(parsed.protocol)) {
              throw new Error('custom_base_url must use http or https');
            }
            baseUrl = parsed.toString().replace(/\/$/, '');
          } else if (target === 'dev') {
            baseUrl = 'https://api-dev.briananderson.xyz';
          } else {
            baseUrl = 'https://api.briananderson.xyz';
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `base_url=${baseUrl}\n`);
          const publicEnvironment = target === 'production' ? 'production' : target === 'dev' ? 'staging' : 'ci';
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `public_environment=${publicEnvironment}\n`);
          NODE

      - name: Record public eval date
        id: public-eval-date
        run: echo "run_date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Run full AI eval suite
        working-directory: site
        env:
          AI_EVAL_BASE_URL: ${{ steps.target.outputs.base_url }}
          AI_EVAL_REPORT_PATH: artifacts/ai-evals-manual.json
          AI_EVAL_JUDGE_PROVIDER: ${{ github.event.inputs.judge_provider != 'none' && github.event.inputs.judge_provider || '' }}
          AI_EVAL_JUDGE_MODEL: ${{ github.event.inputs.judge_model }}
          AI_EVAL_PUBLIC_HISTORY_PATH: artifacts/ai-eval-history-public.json
          AI_EVAL_PUBLIC_RUN_ID: github-${{ github.run_id }}-${{ github.run_attempt }}
          AI_EVAL_PUBLIC_RUN_DATE: ${{ steps.public-eval-date.outputs.run_date }}
          AI_EVAL_PUBLIC_COMMIT: ${{ github.sha }}
          AI_EVAL_PUBLIC_ENVIRONMENT: ${{ steps.target.outputs.public_environment }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm run test:ai:evals

      - name: Upload sanitized aggregate AI eval history
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ai-eval-history-public
          path: site/artifacts/ai-eval-history-public.json
          if-no-files-found: ignore
          retention-days: 14
