name: Build and Deploy

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: 'Deploy to production (default: dev only)'
        required: false
        default: false
        type: boolean
      rollback:
        description: 'Rollback to previous successful deployment'
        required: false
        default: false
        type: boolean
      target_env:
        description: 'Target environment for rollback (dev or prod)'
        required: false
        default: 'prod'
        type: choice
        options:
          - dev
          - prod

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install deps
        working-directory: site
        run: pnpm i --frozen-lockfile || pnpm i
      - name: Create .env file (Prod for validation)
        working-directory: site
        run: |
          echo "PUBLIC_SITE_URL=https://briananderson.xyz" > .env
          echo "PUBLIC_ENV=prod" >> .env
          echo "PUBLIC_POSTHOG_KEY=${{ secrets.PUBLIC_POSTHOG_KEY }}" >> .env
          echo "PUBLIC_POSTHOG_HOST=${{ secrets.PUBLIC_POSTHOG_HOST }}" >> .env
      - name: Debug .env creation
        working-directory: site
        run: |
          ls -la .env
          echo "Content of .env (sanitized):"
          grep "PUBLIC_SITE_URL" .env || echo "PUBLIC_SITE_URL not found in .env"
      - name: Lint
        working-directory: site
        run: pnpm run lint
      - name: Run validation
        working-directory: site
        env:
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
          PUBLIC_SITE_URL: https://briananderson.xyz
        run: pnpm run validate
      - name: Debug Build Output
        working-directory: site
        run: |
          echo "Checking sitemap.xml..."
          if [ -f "build/sitemap.xml" ]; then
            head -n 5 build/sitemap.xml
          else
            echo "sitemap.xml not found!"
          fi
          
          echo "Checking robots.txt..."
          if [ -f "build/robots.txt" ]; then
            cat build/robots.txt
          else
            echo "robots.txt not found!"
          fi

  build-functions:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.inputs.rollback != 'true'
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install functions deps
        working-directory: site/functions
        run: pnpm i --frozen-lockfile || pnpm i
      - name: Build functions
        working-directory: site/functions
        run: pnpm run build
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Docker auth
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev
      - name: Build and push container
        id: build
        working-directory: site/functions
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/site-functions/api:${GITHUB_SHA:0:8}"
          docker build -t "$IMAGE" .
          PUSH_OUTPUT=$(docker push "$IMAGE" 2>&1)
          DIGEST=$(echo "$PUSH_OUTPUT" | grep -oP 'sha256:[a-f0-9]+' | tail -1)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

  deploy-functions-dev:
    runs-on: ubuntu-latest
    needs: build-functions
    environment: dev
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy chat-dev
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE: ${{ needs.build-functions.outputs.image }}
        run: |
          IMAGE="${IMAGE:-${REGION}-docker.pkg.dev/${PROJECT_ID}/site-functions/api:${GITHUB_SHA:0:8}}"
          gcloud run deploy chat-dev \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "FUNCTION_TARGET=chat" \
            --set-env-vars "SITE_URL=https://dev.briananderson.xyz" \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest" \
            --service-account "cloud-run-runtime@${PROJECT_ID}.iam.gserviceaccount.com" \
            --max-instances 5 \
            --memory 512Mi
      - name: Deploy fitfinder-dev
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE: ${{ needs.build-functions.outputs.image }}
        run: |
          IMAGE="${IMAGE:-${REGION}-docker.pkg.dev/${PROJECT_ID}/site-functions/api:${GITHUB_SHA:0:8}}"
          gcloud run deploy fitfinder-dev \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "FUNCTION_TARGET=fitfinder" \
            --set-env-vars "SITE_URL=https://dev.briananderson.xyz" \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest" \
            --service-account "cloud-run-runtime@${PROJECT_ID}.iam.gserviceaccount.com" \
            --max-instances 5 \
            --memory 512Mi
      - name: Smoke test dev Cloud Run services
        id: smoke
        run: |
          echo "Warming up dev Cloud Run services..."
          CHAT_OK=false
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api-dev.briananderson.xyz/chat -X POST -H "Content-Type: application/json" -d '{"message":"ping"}') && echo "chat: $STATUS" && CHAT_OK=true && break || echo "chat: attempt $i failed, retrying..."
            sleep 5
          done
          FIT_OK=false
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api-dev.briananderson.xyz/fit-finder -X POST -H "Content-Type: application/json" -d '{"jobDescription":"Senior TypeScript developer with React and Node experience"}') && echo "fit-finder: $STATUS" && FIT_OK=true && break || echo "fit-finder: attempt $i failed, retrying..."
            sleep 5
          done
          if [ "$CHAT_OK" != "true" ] || [ "$FIT_OK" != "true" ]; then
            echo "smoke_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Rollback dev Cloud Run on failure
        if: failure() && steps.smoke.outcome == 'failure'
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          STABLE_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/site-functions/api:dev-stable"
          echo "Rolling back dev Cloud Run to dev-stable..."
          gcloud run deploy chat-dev --image "$STABLE_IMAGE" --region "$REGION" --platform managed --allow-unauthenticated || true
          gcloud run deploy fitfinder-dev --image "$STABLE_IMAGE" --region "$REGION" --platform managed --allow-unauthenticated || true
          echo "Cloud Run rollback complete."
          exit 1

  deploy-functions-prod:
    runs-on: ubuntu-latest
    needs: [build-functions, deploy-dev]
    environment: prod
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_prod == 'true'
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy chat (prod)
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE: ${{ needs.build-functions.outputs.image }}
        run: |
          IMAGE="${IMAGE:-${REGION}-docker.pkg.dev/${PROJECT_ID}/site-functions/api:${GITHUB_SHA:0:8}}"
          gcloud run deploy chat \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "FUNCTION_TARGET=chat" \
            --set-env-vars "SITE_URL=https://briananderson.xyz" \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest" \
            --service-account "cloud-run-runtime@${PROJECT_ID}.iam.gserviceaccount.com" \
            --max-instances 10 \
            --memory 512Mi
      - name: Deploy fitfinder (prod)
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE: ${{ needs.build-functions.outputs.image }}
        run: |
          IMAGE="${IMAGE:-${REGION}-docker.pkg.dev/${PROJECT_ID}/site-functions/api:${GITHUB_SHA:0:8}}"
          gcloud run deploy fitfinder \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "FUNCTION_TARGET=fitfinder" \
            --set-env-vars "SITE_URL=https://briananderson.xyz" \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest" \
            --service-account "cloud-run-runtime@${PROJECT_ID}.iam.gserviceaccount.com" \
            --max-instances 10 \
            --memory 512Mi
      - name: Smoke test prod Cloud Run services
        id: smoke
        run: |
          echo "Warming up prod Cloud Run services..."
          CHAT_OK=false
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.briananderson.xyz/chat -X POST -H "Content-Type: application/json" -d '{"message":"ping"}') && echo "chat: $STATUS" && CHAT_OK=true && break || echo "chat: attempt $i failed, retrying..."
            sleep 5
          done
          FIT_OK=false
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.briananderson.xyz/fit-finder -X POST -H "Content-Type: application/json" -d '{"jobDescription":"Senior TypeScript developer with React and Node experience"}') && echo "fit-finder: $STATUS" && FIT_OK=true && break || echo "fit-finder: attempt $i failed, retrying..."
            sleep 5
          done
          if [ "$CHAT_OK" != "true" ] || [ "$FIT_OK" != "true" ]; then
            echo "smoke_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Rollback prod Cloud Run on failure
        if: failure() && steps.smoke.outcome == 'failure'
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          STABLE_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/site-functions/api:prod-stable"
          echo "Rolling back prod Cloud Run to prod-stable..."
          gcloud run deploy chat --image "$STABLE_IMAGE" --region "$REGION" --platform managed --allow-unauthenticated || true
          gcloud run deploy fitfinder --image "$STABLE_IMAGE" --region "$REGION" --platform managed --allow-unauthenticated || true
          echo "Cloud Run rollback complete."
          exit 1

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [validate, build-functions, deploy-functions-dev]
    environment: dev
    outputs:
      image_digest: ${{ needs.build-functions.outputs.digest }}
    if: github.event.inputs.rollback != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install deps
        working-directory: site
        run: pnpm i --frozen-lockfile || pnpm i
      - name: Install Playwright browsers
        working-directory: site
        run: pnpm exec playwright install chromium
      - name: Create .env file (Dev)
        working-directory: site
        run: |
          echo "PUBLIC_SITE_URL=https://dev.briananderson.xyz" > .env
          echo "PUBLIC_ENV=dev" >> .env
          echo "PUBLIC_POSTHOG_KEY=${{ secrets.PUBLIC_POSTHOG_KEY }}" >> .env
          echo "PUBLIC_POSTHOG_HOST=${{ secrets.PUBLIC_POSTHOG_HOST }}" >> .env
      - name: Build for Dev
        working-directory: site
        run: pnpm run build
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Get last successful dev deployment
        id: last_successful
        run: |
          LAST_SUCCESSFUL=$(gh run list --workflow=build-and-deploy.yml --branch=main --limit=100 --json databaseId --jq '.[].databaseId' | while read run_id; do
            if gh run view $run_id --json jobs --jq '.jobs[] | select(.name == "deploy-dev" and .conclusion == "success")' | grep -q .; then
              echo $run_id
              break
            fi
          done || echo "none")
          if [ "$LAST_SUCCESSFUL" == "none" ] || [ -z "$LAST_SUCCESSFUL" ]; then
            echo "No previous successful dev deployment found"
            echo "run_id=none" >> $GITHUB_OUTPUT
          else
            echo "run_id=$LAST_SUCCESSFUL" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload to dev bucket
        run: |
          # Upload hashed assets (long cache)
          gcloud storage rsync site/build/_app gs://dev.briananderson.xyz/_app --recursive --cache-control="public, max-age=31536000, immutable"

          # Upload versioned content index (long cache, immutable)
          if compgen -G "site/build/content-index.*.json" > /dev/null; then
            gcloud storage cp site/build/content-index.*.json gs://dev.briananderson.xyz/ --cache-control="public, max-age=31536000, immutable"
          fi

          # Upload content index pointer (short cache)
          if [ -f "site/build/content-index-latest.json" ]; then
            gcloud storage cp site/build/content-index-latest.json gs://dev.briananderson.xyz/ --cache-control="public, max-age=60, must-revalidate"
          fi

          # Upload main content index fallback (medium cache)
          if [ -f "site/build/content-index.json" ]; then
            gcloud storage cp site/build/content-index.json gs://dev.briananderson.xyz/ --cache-control="public, max-age=300, must-revalidate"
          fi

          # Upload everything else (standard cache)
          gcloud storage rsync site/build/ gs://dev.briananderson.xyz/ --recursive --delete-unmatched-destination-objects --cache-control="public, max-age=3600, must-revalidate"
      - name: Warm up dev API services
        run: |
          echo "Warming up dev Cloud Run services..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api-dev.briananderson.xyz/chat -X POST -H "Content-Type: application/json" -d '{"message":"ping"}') && echo "chat: $STATUS" && break || echo "chat: attempt $i failed, retrying..."
            sleep 5
          done
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api-dev.briananderson.xyz/fit-finder -X POST -H "Content-Type: application/json" -d '{"jobDescription":"Senior TypeScript developer with React and Node experience"}') && echo "fit-finder: $STATUS" && break || echo "fit-finder: attempt $i failed, retrying..."
            sleep 5
          done
          sleep 3
      - name: Run E2E tests
        id: smoke
        working-directory: site
        env:
          PLAYWRIGHT_TEST_BASE_URL: https://dev.briananderson.xyz
        continue-on-error: true
        run: pnpm run test:e2e
      - name: Run API smoke tests
        id: smoke_api
        working-directory: site
        env:
          SITE_URL: https://api-dev.briananderson.xyz
          SMOKE_TEST: 'true'
        continue-on-error: true
        run: pnpm run test:api
      - name: Run AI behavior evals
        id: ai_evals
        working-directory: site
        env:
          AI_EVAL_BASE_URL: https://api-dev.briananderson.xyz
        continue-on-error: true
        run: pnpm run test:ai:evals
      - name: Upload dev build artifact (Verified)
        if: steps.smoke.outcome == 'success' && steps.smoke_api.outcome == 'success' && steps.ai_evals.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-dev
          path: site/build/
          retention-days: 14
      - name: Tag image as dev-stable
        if: steps.smoke.outcome == 'success' && steps.smoke_api.outcome == 'success' && steps.ai_evals.outcome == 'success'
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE: ${{ needs.build-functions.outputs.image }}
        run: |
          IMAGE="${IMAGE:-${REGION}-docker.pkg.dev/${PROJECT_ID}/site-functions/api:${GITHUB_SHA:0:8}}"
          gcloud artifacts docker tags add "$IMAGE" "${REGION}-docker.pkg.dev/${PROJECT_ID}/site-functions/api:dev-stable"
      - name: Rollback on failure
        if: (steps.smoke.outcome == 'failure' || steps.smoke_api.outcome == 'failure' || steps.ai_evals.outcome == 'failure') && steps.last_successful.outputs.run_id != 'none'
        env:
          LAST_RUN_ID: ${{ steps.last_successful.outputs.run_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "❌ Smoke tests failed, rolling back dev to run $LAST_RUN_ID..."
          gh run download $LAST_RUN_ID -n build-artifact-dev

          # Upload with proper cache headers
          gcloud storage rsync site/build/_app gs://dev.briananderson.xyz/_app --recursive --cache-control="public, max-age=31536000, immutable"

          if compgen -G "site/build/content-index.*.json" > /dev/null; then
            gcloud storage cp site/build/content-index.*.json gs://dev.briananderson.xyz/ --cache-control="public, max-age=31536000, immutable"
          fi
          if [ -f "site/build/content-index-latest.json" ]; then
            gcloud storage cp site/build/content-index-latest.json gs://dev.briananderson.xyz/ --cache-control="public, max-age=60, must-revalidate"
          fi
          if [ -f "site/build/content-index.json" ]; then
            gcloud storage cp site/build/content-index.json gs://dev.briananderson.xyz/ --cache-control="public, max-age=300, must-revalidate"
          fi

          gcloud storage rsync site/build/ gs://dev.briananderson.xyz/ --recursive --delete-unmatched-destination-objects --cache-control="public, max-age=3600, must-revalidate"
          echo "Rollback complete."
          exit 1
      - name: Fail if smoke tests failed
        if: steps.smoke.outcome == 'failure' || steps.smoke_api.outcome == 'failure' || steps.ai_evals.outcome == 'failure'
        run: exit 1

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [validate, build-functions, deploy-functions-prod]
    environment: prod
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_prod == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install deps
        working-directory: site
        run: pnpm i --frozen-lockfile || pnpm i
      - name: Install Playwright browsers
        working-directory: site
        run: pnpm exec playwright install chromium
      - name: Create .env file (Prod)
        working-directory: site
        run: |
          echo "PUBLIC_SITE_URL=https://briananderson.xyz" > .env
          echo "PUBLIC_ENV=prod" >> .env
          echo "PUBLIC_POSTHOG_KEY=${{ secrets.PUBLIC_POSTHOG_KEY }}" >> .env
          echo "PUBLIC_POSTHOG_HOST=${{ secrets.PUBLIC_POSTHOG_HOST }}" >> .env
      - name: Build for Prod
        working-directory: site
        run: |
          rm -rf .svelte-kit .vite
          touch src/routes/+layout.svelte
          pnpm run build
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Get last successful prod deployment
        id: last_successful
        run: |
          LAST_SUCCESSFUL=$(gh run list --workflow=build-and-deploy.yml --branch=main --limit=100 --json databaseId --jq '.[].databaseId' | while read run_id; do
            if gh run view $run_id --json jobs --jq '.jobs[] | select(.name == "deploy-prod" and .conclusion == "success")' | grep -q .; then
              echo $run_id
              break
            fi
          done || echo "none")
          if [ "$LAST_SUCCESSFUL" == "none" ] || [ -z "$LAST_SUCCESSFUL" ]; then
            echo "No previous successful prod deployment found"
            echo "run_id=none" >> $GITHUB_OUTPUT
          else
            echo "run_id=$LAST_SUCCESSFUL" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload to prod bucket
        id: deploy
        run: |
          # Upload hashed assets (long cache)
          gcloud storage rsync site/build/_app gs://briananderson.xyz/_app --recursive --cache-control="public, max-age=31536000, immutable"

          # Upload versioned content index (long cache, immutable)
          if compgen -G "site/build/content-index.*.json" > /dev/null; then
            gcloud storage cp site/build/content-index.*.json gs://briananderson.xyz/ --cache-control="public, max-age=31536000, immutable"
          fi

          # Upload content index pointer (short cache)
          if [ -f "site/build/content-index-latest.json" ]; then
            gcloud storage cp site/build/content-index-latest.json gs://briananderson.xyz/ --cache-control="public, max-age=60, must-revalidate"
          fi

          # Upload main content index fallback (medium cache)
          if [ -f "site/build/content-index.json" ]; then
            gcloud storage cp site/build/content-index.json gs://briananderson.xyz/ --cache-control="public, max-age=300, must-revalidate"
          fi

          # Upload everything else (standard cache)
          gcloud storage rsync site/build/ gs://briananderson.xyz/ --recursive --delete-unmatched-destination-objects --cache-control="public, max-age=3600, must-revalidate"
      - name: Warm up prod API services
        run: |
          echo "Warming up prod Cloud Run services..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.briananderson.xyz/chat -X POST -H "Content-Type: application/json" -d '{"message":"ping"}') && echo "chat: $STATUS" && break || echo "chat: attempt $i failed, retrying..."
            sleep 5
          done
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.briananderson.xyz/fit-finder -X POST -H "Content-Type: application/json" -d '{"jobDescription":"Senior TypeScript developer with React and Node experience"}') && echo "fit-finder: $STATUS" && break || echo "fit-finder: attempt $i failed, retrying..."
            sleep 5
          done
          sleep 3
      - name: Run smoke tests
        id: smoke
        working-directory: site
        env:
          PLAYWRIGHT_TEST_BASE_URL: https://briananderson.xyz
        continue-on-error: true
        run: pnpm run test:e2e
      - name: Run API smoke tests
        id: smoke_api
        working-directory: site
        env:
          SITE_URL: https://api.briananderson.xyz
          SMOKE_TEST: 'true'
        continue-on-error: true
        run: pnpm run test:api
      - name: Upload prod build artifact (Verified)
        if: steps.smoke.outcome == 'success' && steps.smoke_api.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-prod
          path: site/build/
          retention-days: 30
      - name: Tag image as prod-stable
        if: steps.smoke.outcome == 'success' && steps.smoke_api.outcome == 'success'
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE: ${{ needs.build-functions.outputs.image }}
        run: |
          IMAGE="${IMAGE:-${REGION}-docker.pkg.dev/${PROJECT_ID}/site-functions/api:${GITHUB_SHA:0:8}}"
          gcloud artifacts docker tags add "$IMAGE" "${REGION}-docker.pkg.dev/${PROJECT_ID}/site-functions/api:prod-stable"
      - name: Rollback on failure
        if: (steps.smoke.outcome == 'failure' || steps.smoke_api.outcome == 'failure') && steps.last_successful.outputs.run_id != 'none'
        env:
          LAST_RUN_ID: ${{ steps.last_successful.outputs.run_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "❌ Smoke tests failed, rolling back prod to run $LAST_RUN_ID..."
          gh run download $LAST_RUN_ID -n build-artifact-prod

          # Upload with proper cache headers
          gcloud storage rsync site/build/_app gs://briananderson.xyz/_app --recursive --cache-control="public, max-age=31536000, immutable"

          if compgen -G "site/build/content-index.*.json" > /dev/null; then
            gcloud storage cp site/build/content-index.*.json gs://briananderson.xyz/ --cache-control="public, max-age=31536000, immutable"
          fi
          if [ -f "site/build/content-index-latest.json" ]; then
            gcloud storage cp site/build/content-index-latest.json gs://briananderson.xyz/ --cache-control="public, max-age=60, must-revalidate"
          fi
          if [ -f "site/build/content-index.json" ]; then
            gcloud storage cp site/build/content-index.json gs://briananderson.xyz/ --cache-control="public, max-age=300, must-revalidate"
          fi

          gcloud storage rsync site/build/ gs://briananderson.xyz/ --recursive --delete-unmatched-destination-objects --cache-control="public, max-age=3600, must-revalidate"
          echo "Rollback complete."
          exit 1
      - name: Fail if smoke tests failed
        if: steps.smoke.outcome == 'failure' || steps.smoke_api.outcome == 'failure'
        run: exit 1
      - name: Warn if no rollback target
        if: (steps.smoke.outcome == 'failure' || steps.smoke_api.outcome == 'failure') && steps.last_successful.outputs.run_id == 'none'
        run: |
          echo "⚠️  Smoke tests failed but no previous successful prod deployment found for rollback."
          echo "This is the first prod deployment - manual intervention may be required."
          exit 1

  rollback-manual:
    runs-on: ubuntu-latest
    if: github.event.inputs.rollback == 'true'
    environment: ${{ github.event.inputs.target_env }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Rollback Cloud Run services
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          TARGET_ENV: ${{ github.event.inputs.target_env }}
        run: |
          STABLE_TAG="dev-stable"
          CHAT_SERVICE="chat-dev"
          FIT_SERVICE="fitfinder-dev"
          if [ "$TARGET_ENV" == "prod" ]; then
            STABLE_TAG="prod-stable"
            CHAT_SERVICE="chat"
            FIT_SERVICE="fitfinder"
          fi
          STABLE_IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/site-functions/api:${STABLE_TAG}"
          echo "Rolling back $CHAT_SERVICE and $FIT_SERVICE to $STABLE_TAG image..."
          gcloud run deploy $CHAT_SERVICE \
            --image "$STABLE_IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --no-traffic
          gcloud run services update-traffic $CHAT_SERVICE --region "$REGION" --to-latest
          gcloud run deploy $FIT_SERVICE \
            --image "$STABLE_IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --no-traffic
          gcloud run services update-traffic $FIT_SERVICE --region "$REGION" --to-latest
          echo "Cloud Run rollback complete."
      - uses: actions/checkout@v4
      - name: Get last successful deployment
        id: last_successful
        run: |
          TARGET_ENV="${{ github.event.inputs.target_env }}"
          LAST_SUCCESSFUL=$(gh run list --workflow=build-and-deploy.yml --branch=main --limit=100 --json databaseId --jq '.[].databaseId' | while read run_id; do
            if gh run view $run_id --json jobs --jq '.jobs[] | select(.name == "deploy-'$TARGET_ENV'" and .conclusion == "success")' | grep -q .; then
              echo $run_id
              break
            fi
          done || echo "none")
          if [ "$LAST_SUCCESSFUL" == "none" ] || [ -z "$LAST_SUCCESSFUL" ]; then
            echo "No previous successful deployment found for $TARGET_ENV"
            echo "run_id=none" >> $GITHUB_OUTPUT
          else
            echo "run_id=$LAST_SUCCESSFUL" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Check if rollback target exists
        if: steps.last_successful.outputs.run_id == 'none'
        run: |
          echo "❌ No previous successful deployment found for rollback."
          exit 1
      - name: Download artifact
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_ENV: ${{ github.event.inputs.target_env }}
        run: |
          RUN_ID=${{ steps.last_successful.outputs.run_id }}
          ARTIFACT_NAME="build-artifact-$TARGET_ENV"
          echo "Downloading $ARTIFACT_NAME from run $RUN_ID..."
          gh run download $RUN_ID -n $ARTIFACT_NAME --dir site/build/
      - name: Verify artifact download
        run: |
          echo "Files in site/build/:"
          find site/build -type f | wc -l
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Rollback to ${{ github.event.inputs.target_env }}
        run: |
          BUCKET="dev.briananderson.xyz"
          if [ "${{ github.event.inputs.target_env }}" == "prod" ]; then
            BUCKET="briananderson.xyz"
          fi

          # Upload with proper cache headers
          gcloud storage rsync site/build/_app gs://$BUCKET/_app --recursive --cache-control="public, max-age=31536000, immutable"

          if compgen -G "site/build/content-index.*.json" > /dev/null; then
            gcloud storage cp site/build/content-index.*.json gs://$BUCKET/ --cache-control="public, max-age=31536000, immutable"
          fi
          if [ -f "site/build/content-index-latest.json" ]; then
            gcloud storage cp site/build/content-index-latest.json gs://$BUCKET/ --cache-control="public, max-age=60, must-revalidate"
          fi
          if [ -f "site/build/content-index.json" ]; then
            gcloud storage cp site/build/content-index.json gs://$BUCKET/ --cache-control="public, max-age=300, must-revalidate"
          fi

          gcloud storage rsync site/build/ gs://$BUCKET/ --recursive --delete-unmatched-destination-objects --cache-control="public, max-age=3600, must-revalidate"
          echo "✅ Rollback to ${{ github.event.inputs.target_env }} complete"