name: Build and Deploy Dev

permissions: {}

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: site
        run: pnpm install --frozen-lockfile
      - name: Validate site
        working-directory: site
        env:
          PUBLIC_SITE_URL: https://dev.briananderson.xyz
          PUBLIC_ENV: dev
          PUBLIC_POSTHOG_KEY: phc_ci_validation_only
          PUBLIC_POSTHOG_HOST: https://posthog.invalid
        run: pnpm run validate

  build-functions:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: site/functions/pnpm-lock.yaml
      - name: Install functions dependencies
        working-directory: site/functions
        run: pnpm install --frozen-lockfile
      - name: Build functions
        working-directory: site/functions
        run: pnpm run build
      - name: Test functions
        working-directory: site/functions
        run: pnpm test
      - name: Build container without cloud credentials
        working-directory: site/functions
        run: docker build --tag site-functions:validation .

  publish-functions:
    runs-on: ubuntu-latest
    needs: build-functions
    if: vars.DEV_DEPLOY_ENABLED == 'true'
    permissions:
      contents: read
      id-token: write
    outputs:
      image_ref: ${{ steps.publish.outputs.image_ref }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Check publisher configuration
        id: config
        env:
          PROVIDER: ${{ secrets.GCP_WIF_PUBLISHER_PROVIDER }}
          SERVICE_ACCOUNT: ${{ secrets.GCP_WIF_PUBLISHER_SA_EMAIL }}
          REGION: ${{ vars.GCP_REGION }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          if [ -n "$PROVIDER" ] && [ -n "$SERVICE_ACCOUNT" ] && [ -n "$REGION" ] && [ -n "$PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Publisher bootstrap is incomplete; container publication is safely skipped." >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        if: steps.config.outputs.ready == 'true'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PUBLISHER_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_PUBLISHER_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        if: steps.config.outputs.ready == 'true'
      - name: Configure Artifact Registry authentication
        if: steps.config.outputs.ready == 'true'
        env:
          REGION: ${{ vars.GCP_REGION }}
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
      - name: Build, push, and confirm immutable image
        id: publish
        if: steps.config.outputs.ready == 'true'
        working-directory: site/functions
        env:
          REGION: ${{ vars.GCP_REGION }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          IMAGE_NAME="${REGION}-docker.pkg.dev/${PROJECT_ID}/site-functions/api"
          IMAGE_TAG="${IMAGE_NAME}:${GITHUB_SHA}"
          METADATA_FILE="${RUNNER_TEMP}/build-metadata.json"

          docker buildx build --push --metadata-file "$METADATA_FILE" --tag "$IMAGE_TAG" .
          DIGEST=$(jq -r '."containerimage.digest" // empty' "$METADATA_FILE")
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Artifact Registry did not return an immutable digest" >&2
            exit 1
          fi

          IMAGE_REF="${IMAGE_NAME}@${DIGEST}"
          docker buildx imagetools inspect "$IMAGE_REF" >/dev/null
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "Published $IMAGE_REF"

  deploy-functions-dev:
    runs-on: ubuntu-latest
    needs: publish-functions
    if: vars.DEV_DEPLOY_ENABLED == 'true'
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check dev deployment configuration
        id: config
        env:
          PROVIDER: ${{ secrets.GCP_WIF_DEV_PROVIDER }}
          SERVICE_ACCOUNT: ${{ secrets.GCP_WIF_DEV_SA_EMAIL }}
          REGION: ${{ vars.GCP_REGION }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          IMAGE_REF: ${{ needs.publish-functions.outputs.image_ref }}
        run: |
          if [ -n "$PROVIDER" ] && [ -n "$SERVICE_ACCOUNT" ] && [ -n "$REGION" ] && [ -n "$PROJECT_ID" ] && [ -n "$IMAGE_REF" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Dev bootstrap or immutable image output is incomplete; service deployment is safely skipped." >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        if: steps.config.outputs.ready == 'true'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_DEV_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_DEV_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        if: steps.config.outputs.ready == 'true'
      - name: Validate immutable release input
        if: steps.config.outputs.ready == 'true'
        env:
          IMAGE_REF: ${{ needs.publish-functions.outputs.image_ref }}
        run: |
          if [[ ! "$IMAGE_REF" =~ ^[^[:space:]]+-docker\.pkg\.dev/[^[:space:]]+@sha256:[0-9a-f]{64}$ ]]; then
            echo "Missing registry-confirmed immutable image reference" >&2
            exit 1
          fi
      - name: Capture current dev image digests
        if: steps.config.outputs.ready == 'true'
        env:
          REGION: ${{ vars.GCP_REGION }}
        run: |
          set -euo pipefail
          previous_image() {
            local service="$1"
            local revision
            revision=$(gcloud run services describe "$service" --region "$REGION" --format='value(status.latestReadyRevisionName)')
            gcloud run revisions describe "$revision" --region "$REGION" --format='value(spec.containers[0].image)'
          }

          PREVIOUS_CHAT_IMAGE=$(previous_image chat-dev)
          PREVIOUS_FIT_IMAGE=$(previous_image fitfinder-dev)
          for image in "$PREVIOUS_CHAT_IMAGE" "$PREVIOUS_FIT_IMAGE"; do
            if [[ ! "$image" =~ @sha256:[0-9a-f]{64}$ ]]; then
              echo "Cannot deploy safely without an immutable previous dev image" >&2
              exit 1
            fi
          done
          echo "PREVIOUS_CHAT_IMAGE=$PREVIOUS_CHAT_IMAGE" >> "$GITHUB_ENV"
          echo "PREVIOUS_FIT_IMAGE=$PREVIOUS_FIT_IMAGE" >> "$GITHUB_ENV"
      - name: Deploy dev services by digest
        id: deploy
        if: steps.config.outputs.ready == 'true'
        env:
          IMAGE_REF: ${{ needs.publish-functions.outputs.image_ref }}
          REGION: ${{ vars.GCP_REGION }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          deploy_service() {
            local service="$1"
            local target="$2"
            gcloud run deploy "$service" \
              --image "$IMAGE_REF" \
              --region "$REGION" \
              --platform managed \
              --set-env-vars "NODE_ENV=production,FUNCTION_TARGET=${target},SITE_URL=https://dev.briananderson.xyz" \
              --set-secrets "GEMINI_API_KEY=gemini-api-key:latest,ORIGIN_VERIFY_TOKEN=origin-verify-token-dev:latest" \
              --service-account "cloud-run-runtime-dev@${PROJECT_ID}.iam.gserviceaccount.com" \
              --max-instances 5 \
              --concurrency 20 \
              --timeout 120 \
              --memory 512Mi \
              --quiet
          }
          deploy_service chat-dev chat
          deploy_service fitfinder-dev fitfinder
      - name: Verify deployed dev image digests
        id: verify
        if: steps.config.outputs.ready == 'true'
        env:
          EXPECTED_IMAGE: ${{ needs.publish-functions.outputs.image_ref }}
          REGION: ${{ vars.GCP_REGION }}
        run: |
          set -euo pipefail
          deployed_image() {
            local service="$1"
            local revision
            revision=$(gcloud run services describe "$service" --region "$REGION" --format='value(status.latestReadyRevisionName)')
            gcloud run revisions describe "$revision" --region "$REGION" --format='value(spec.containers[0].image)'
          }
          for service in chat-dev fitfinder-dev; do
            ACTUAL_IMAGE=$(deployed_image "$service")
            if [ "$ACTUAL_IMAGE" != "$EXPECTED_IMAGE" ]; then
              echo "$service resolved to $ACTUAL_IMAGE, expected $EXPECTED_IMAGE" >&2
              exit 1
            fi
          done
          echo "Both dev services report $EXPECTED_IMAGE" >> "$GITHUB_STEP_SUMMARY"
      - name: Smoke test dev services
        id: smoke
        if: steps.config.outputs.ready == 'true'
        run: |
          set -euo pipefail
          curl --fail-with-body --retry 4 --retry-all-errors --retry-delay 5 \
            --header "Content-Type: application/json" \
            --data '{"message":"ping"}' \
            https://api-dev.briananderson.xyz/chat >/dev/null
          curl --fail-with-body --retry 4 --retry-all-errors --retry-delay 5 \
            --header "Content-Type: application/json" \
            --data '{"jobDescription":"Senior TypeScript developer with React and Node experience"}' \
            https://api-dev.briananderson.xyz/fit-finder >/dev/null
      - name: Roll back dev services to captured digests
        if: steps.config.outputs.ready == 'true' && failure() && (steps.deploy.outcome == 'failure' || steps.verify.outcome == 'failure' || steps.smoke.outcome == 'failure')
        env:
          REGION: ${{ vars.GCP_REGION }}
        run: |
          set -euo pipefail
          gcloud run deploy chat-dev --image "$PREVIOUS_CHAT_IMAGE" --region "$REGION" --platform managed --quiet
          gcloud run deploy fitfinder-dev --image "$PREVIOUS_FIT_IMAGE" --region "$REGION" --platform managed --quiet
          echo "Dev services restored to their captured immutable digests" >&2
          exit 1

  deploy-site-dev:
    runs-on: ubuntu-latest
    needs: [validate, deploy-functions-dev]
    if: vars.DEV_DEPLOY_ENABLED == 'true'
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: site
        run: pnpm install --frozen-lockfile
      - name: Build dev site
        working-directory: site
        env:
          PUBLIC_SITE_URL: https://dev.briananderson.xyz
          PUBLIC_ENV: dev
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
        run: pnpm run build
      - name: Install Playwright browser
        working-directory: site
        run: pnpm exec playwright install --with-deps chromium
      - name: Check dev static deployment configuration
        id: config
        env:
          PROVIDER: ${{ secrets.GCP_WIF_DEV_PROVIDER }}
          SERVICE_ACCOUNT: ${{ secrets.GCP_WIF_DEV_SA_EMAIL }}
        run: |
          if [ -n "$PROVIDER" ] && [ -n "$SERVICE_ACCOUNT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Dev identity bootstrap is incomplete; static deployment is safely skipped." >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        if: steps.config.outputs.ready == 'true'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_DEV_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_DEV_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        if: steps.config.outputs.ready == 'true'
      - name: Upload static site to dev bucket
        if: steps.config.outputs.ready == 'true'
        run: |
          set -euo pipefail
          gcloud storage rsync site/build/_app gs://dev.briananderson.xyz/_app --recursive --cache-control="public, max-age=31536000, immutable"
          if compgen -G "site/build/content-index.*.json" >/dev/null; then
            gcloud storage cp site/build/content-index.*.json gs://dev.briananderson.xyz/ --cache-control="public, max-age=31536000, immutable"
          fi
          if [ -f site/build/content-index-latest.json ]; then
            gcloud storage cp site/build/content-index-latest.json gs://dev.briananderson.xyz/ --cache-control="public, max-age=60, must-revalidate"
          fi
          if [ -f site/build/content-index.json ]; then
            gcloud storage cp site/build/content-index.json gs://dev.briananderson.xyz/ --cache-control="public, max-age=300, must-revalidate"
          fi
          gcloud storage rsync site/build/ gs://dev.briananderson.xyz/ --recursive --delete-unmatched-destination-objects --cache-control="public, max-age=60, must-revalidate"
      - name: Verify dev site
        if: steps.config.outputs.ready == 'true'
        run: curl --fail-with-body --retry 4 --retry-all-errors --retry-delay 5 https://dev.briananderson.xyz/ >/dev/null
      - name: Run dev end-to-end checks
        if: steps.config.outputs.ready == 'true'
        working-directory: site
        env:
          PLAYWRIGHT_TEST_BASE_URL: https://dev.briananderson.xyz
        run: pnpm run test:e2e
      - name: Run dev API smoke checks
        if: steps.config.outputs.ready == 'true'
        working-directory: site
        env:
          SITE_URL: https://api-dev.briananderson.xyz
          SMOKE_TEST: "true"
        run: pnpm run test:api
      - name: Run dev AI behavior smoke gate
        if: steps.config.outputs.ready == 'true'
        working-directory: site
        env:
          AI_EVAL_BASE_URL: https://api-dev.briananderson.xyz
          AI_EVAL_MIN_PASS_RATE: "1.00"
          AI_EVAL_REPORT_PATH: artifacts/ai-smoke-dev-post-deploy.json
        run: pnpm run test:ai:evals:smoke
