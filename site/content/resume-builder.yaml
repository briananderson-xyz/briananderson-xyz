experience:
  - role: Enterprise Solutions Architect
    company: Amazon Web Services
    location: Denver, CO
    description: Building Agentic AI platforms, developer tooling, and customer-facing prototypes.
    highlights:
      - "Industrial Data Platform (ProveIT): Built a full-stack prototype for manufacturing environments that ingested MQTT data streams via a Unified Namespace (UNS) architecture, categorized and standardized stream contents into a time-series database, and integrated an Agentic AI layer using AgentCore and Bedrock for anomaly detection. Delivered persona-specific dashboards (OEE, equipment state) and natural-language querying of production line status."
      - text: "Agentic AI Platform (Stallion): Built a full-stack AI agent platform from scratch with a React/TypeScript UI, Hono API layer, Tauri desktop wrapper, manifest-driven plugins, and MCP tool orchestration. Added OpenTelemetry and Prometheus/Grafana instrumentation so agent behavior, cost, and reliability could be observed instead of guessed."
        link: /projects/stallion-agent-platform/
      - text: "Agentic Developer Tooling (Kiro): Among the top 75 most active users out of 275k+ internal Kiro CLI users. Built agent workflows that standardized ideation, implementation, and verification loops, reduced personal admin overhead by ~4 hours/week, and used promptfoo evals to harden prompts before release."
        link: /projects/kiro-agent-workflows/
      - "Enterprise Architecture (SAP Integration): Guided a global manufacturer through architecting AWS infrastructure for a Document Management System integrated with SAP ERP, implementing infrastructure as code, private VPC with VPC endpoints, and S3 gateway patterns for scalability, resiliency, and cost efficiency."
      - "Customer Solution Prototyping (Amazon Connect): Built a working prototype for a global manufacturer demonstrating Amazon Connect's extensibility, including a secure SMS image-upload integration and multi-threaded conversation support to address visual troubleshooting and extended support hour requirements."
    start_date: September 2024
  - role: Technical Director
    company: Valtech | Kin + Carta
    location: Denver, CO
    description: Hands-on technical leadership for credit card application modernization.
    highlights:
      - "Application Migration: Lead Architect responsible for migrating 14 core credit card applications from legacy Websphere to OpenShift, refactoring Java Spring Boot services and implementing Helm-based deployments with zero downtime."
      - "Testing Excellence: Implemented TDD practices and automated testing guardrails, significantly reducing production bugs and increasing deployment confidence for the engineering team."
      - "Integration Development (Discover Financial): Integrated Helm Charts on top of OpenShift, establishing best practices across the organization for establishing SLIs/SLOs with Datadog/Instana and high availability/scalability with Kubernetes."
    start_date: March 2024
    end_date: September 2024
  - role: Senior Technical Principal
    company: Kin + Carta
    location: Denver, CO
    description: Built CI/CD platform tooling at Discover Financial and developer infrastructure at Gordon Food Service.
    highlights:
      - text: "CI/CD Platform Engineering (Discover Financial): Built the integration layer for the Trident pipeline, a standardized CI/CD framework spanning 5,000+ applications. Defined Golden Paths and integration playbooks, implemented AWS integration via Kubernetes Operators, and established CD pipeline strategies (canary, blue/green). Resulted in a 90% reduction in deployment lead time."
        link: /projects/discover-trident/
      - text: "Cloud Developer Platform (Gordon Food Service): Built the enterprise 'Golden Path' developer platform, implementing self-service project scaffolding that automated CI/CD setup across GitLab, SonarCloud, NexusIQ, and Apigee."
        link: /projects/gfs-cloud-enablement/
      - "Enterprise Applications (Gordon Food Service): Lead architect in developing a comprehensive library of shared Terraform modules and Liquibase patterns, enabling consistent infrastructure provisioning across all product teams."
      - text: "Data Modernization (Gordon Food Service): Built the data normalization pipelines (Dataflow) and domain access API layer (GKE) for ICDS (Integrated Consumption Data Store), centralizing fragmented data into BigQuery and replacing one-off data duplication patterns across core financial workflows."
        link: /projects/gfs-cloud-enablement/
    start_date: February 2020
    end_date: March 2024
  - role: Technical Principal
    company: Solstice | Kin + Carta
    location: Denver, CO
    description: Built high-concurrency e-commerce platform and mobile applications.
    highlights:
      - text: "E-Commerce Platform: Built a high-concurrency ordering platform using Angular frontend and Java Spring Boot microservices, integrating Firestore for real-time updates, Pub/Sub for event streaming, and Memorystore (Redis) for caching. Achieved 8-9 production deployments per day via Spinnaker while scaling the engineering team to 60+ developers."
        link: /projects/gfs-ordering-platform/
      - "Mobile Architect & CI/CD: Engineered a data-rich native Android application for a major agriculture client, integrating complex mapping features with Mapbox to visualize satellite and drone imagery. Built and deployed a comprehensive Continuous Delivery pipeline from scratch using Fastlane, Jenkins, and Docker, automating parallel builds for iOS and Android. Implemented automated testing via AWS Device Farm and static analysis with SonarQube, significantly reducing deployment friction and ensuring code quality across platforms."
      - "Innovation Leadership: Engineered an internal DevOps framework for standardized distribution of Android, iOS, and Cordova Hybrid applications. Reduced release overhead from 4 weeks to 1 week for 6 production-supported applications via Fabric Beta."
    start_date: January 2017
    end_date: February 2020
  - role: Senior Technical Consultant
    company: Solstice | Kin + Carta
    location: Chicago, IL
    description: Built native mobile apps and experiential commerce prototypes.
    highlights:
      - "iOS & Android Development: Built native iOS and Android applications for a Global Fast Food enterprise, implementing complex user flows and ServiceNow backend integrations."
      - "Modernization Roadmaps: Led technical sales engagements for fleet management clients, performing architectural audits and delivering strategic roadmaps to modernize legacy platforms."
      - "R&D Prototyping: Built experiential commerce prototypes using Raspberry Pi (Flask backend), Amazon Echo (voice UI), and Oculus Rift (Unity 3D) for demonstration at industry conferences."
      - "Location-Based Features: Implemented iBeacon (BLE) proximity detection and Parse real-time messaging for a high-traffic healthcare conference application."
    start_date: July 2015
    end_date: January 2017
  - role: Technical Consultant
