experience:
  - role: Enterprise Solutions Architect
    company: Amazon Web Services
    location: Denver, CO
    description: Specializing in Agentic AI, Cloud Native transformation, and customer solution delivery.
    highlights:
      - "Industrial Agentic AI (ProveIT): Built a manufacturing demo spanning glass and pharma that turns raw MQTT plant data (Unified Namespace into a time-series store) into an agent layer on Bedrock and AgentCore, flagging anomalies and walking operators through SOP-driven troubleshooting in natural language with persona-specific dashboards for OEE and equipment state. Partner Concept Reply featured the demo in a conference keynote and at their booth, and I ran a follow-up workshop on how we built it and how we approached the problem: turning real-time UNS/MQTT signals into persona-specific insight that files work orders and guides maintenance on the factory floor."
      - "Customer Experience and Rapid Prototyping (Amazon Connect): Identified the opportunity and built a working prototype demonstrating multi-threaded conversation support and extended support hours for a global manufacturer, including a secure SMS image-upload integration that closed a specific visual-troubleshooting gap. The technical deep dive turned a stalled account into a live opportunity for their contact-center modernization."
      - "Enterprise Modernization (SAP Integration): Guided a global manufacturer through architecting secure, scalable AWS infrastructure for a Document Management System integrated with SAP ERP. Established best practices for infrastructure as code, private VPC architecture with VPC endpoints, and S3 gateway patterns for high scalability, resiliency, and cost efficiency. Leveraging trust built through earlier prototypes, secured executive buy-in for a comprehensive multi-year cloud migration roadmap."
      - text: "Agentic AI Platform (Stallion): Built a local-first AI agent platform to explore the full lifecycle of agent delivery, including tool orchestration, plugin-based extensibility, and observability for cost, reliability, and agent behavior. Instrumented the platform with OpenTelemetry and Prometheus/Grafana dashboards to make agent runs debuggable and production-ready."
        link: /projects/stallion-agent-platform/
      - text: "Agentic Developer Tooling (Kiro): Designed reusable agent workflows that standardize ideation, implementation, and verification loops for engineering and solutions-architecture work, gated by promptfoo evals that catch prompt regressions before release. Ranked in the top 0.03% of 280k+ Amazon Kiro CLI users by activity."
        link: /projects/kiro-agent-workflows/
    start_date: September 2024
  - role: Technical Director
    company: Valtech | Kin + Carta
    location: Denver, CO
    description: Led cloud modernization for a mission-critical credit card portfolio to OpenShift.
    highlights:
      - "Strategic Enterprise Modernization (Discover Financial): Architected the migration of 14 mission-critical credit card applications from legacy WebSphere/PCF to OpenShift (OCP), presenting delivery roadmaps directly to client Directors and VPs. Delivered all 14 on schedule in six months with a team of four (three near-shore), covering full CI/CD automation, change management, database migration, and active-active cutover."
      - "Engineering Excellence and Enablement: Made TDD and pipeline automation the default for the migration program and served as the architectural escalation point for delivery teams. As an org-wide platform resource, established the standardized patterns that multiple delivery teams adopted to hit aggressive migration deadlines."
      - "Scalable Architecture & Enablement: Directed the implementation of standardized integration patterns using Helm Charts and Kubernetes Operators. Enabled 'first-class' adoption of AWS services (RDS for PostgreSQL) and observability suites (Instana/Datadog) via shared, configurable CI/CD pipelines."
    start_date: March 2024
    end_date: September 2024
  - role: Senior Technical Principal
    company: Kin + Carta
    location: Denver, CO
    description: Led CI/CD platform engineering at Discover Financial and enterprise cloud adoption at Gordon Food Service.
    highlights:
      - text: "CI/CD Platform Engineering (Discover Financial): Led the integration layer for the Trident pipeline, a standardized CI/CD framework spanning 300+ dedicated staff and 5,000+ applications with an estimated $30M in savings. Defined Golden Paths and integration playbooks for production adoption, socialized standards across the organization, and identified gaps in monitoring, AWS integration (via Kubernetes Operators), and deployment strategies (canary, blue/green). Resulted in a 90% reduction in deployment lead time."
        link: /projects/discover-trident/
      - text: "Architectural Governance & Provisioning (Gordon Food Service): Engineered a standardized 'Golden Path' for enterprise cloud adoption by architecting a centralized Terraform module library. This automated the provisioning of fragmented tools (GitLab, SonarCloud, Apigee, NexusIQ) across the enterprise, ensuring security compliance and budgetary guardrails."
        link: /projects/gfs-cloud-enablement/
      - text: "Data Modernization (Gordon Food Service): Led the development of ICDS (Integrated Consumption Data Store), normalizing fragmented data sources into a centralized BigQuery repository with Dataflow pipelines and a standardized API layer on GKE, replacing multiple one-off data duplication patterns that teams relied on for core financial workflows."
        link: /projects/gfs-cloud-enablement/
    start_date: February 2020
    end_date: March 2024
  - role: Technical Principal
    company: Solstice | Kin + Carta
    location: Denver, CO
    description: Architected high-concurrency ordering platforms and geospatial data solutions for agriculture.
    highlights:
      - text: "Google Cloud Ecommerce Architecture (Gordon Food Service): Architected a high-concurrency platform using Angular and Java Spring Boot on GKE, leveraging Firestore, Pub/Sub, and Memorystore. Scaled the organization to 60+ developers across 5 teams, achieving 8-9 production deployments per day."
        link: /projects/gfs-ordering-platform/
      - "Mobile Architecture: Served as Solution Architect and Android Lead for a geospatial field-mapping solution for a large agriculture company. Engineered the architecture to visualize satellite/drone data and integrated a proprietary Nitrogen simulation analysis tool. Built a dual-platform CD pipeline using Fastlane, Docker, and AWS Device Farm to ensure feature parity."
      - "Innovation Leadership: Engineered an internal DevOps framework for standardized distribution of Android, iOS, and Cordova Hybrid applications. Reduced release overhead from 4 weeks to 1 week for 6 production-supported applications via Fabric Beta."
    start_date: January 2017
    end_date: February 2020
  - role: Senior Technical Consultant
    company: Solstice | Kin + Carta
    location: Chicago, IL
    description: Led technical sales and architecture for enterprise mobile and modernization roadmaps.
    highlights:
      - "Enterprise Mobile Strategy: Served as Solution Architect and Tech Lead for native iOS and Android applications for a Global Fast Food enterprise, overseeing integration with the ServiceNow platform."
      - "Modernization Roadmaps: Led technical sales engagements for large-scale fleet management clients, performing architectural audits and providing strategic roadmaps to modernize legacy platforms and UI/UX."
      - "Innovation & R&D Leadership: Spearheaded R&D projects involving Raspberry Pi (Flask), Oculus Rift (Unity 3D), and Amazon Echo to demonstrate experiential commerce at industry conference (Solstice FWD)."
      - "Location-Based Services: Architected a high-traffic healthcare conference application utilizing iBeacons (BLE) for proximity-based notifications and Parse for real-time messaging."
    start_date: July 2015
    end_date: January 2017
  - role: Technical Consultant
    company: Solstice
    location: Chicago, IL
    description: Developed native mobile and hybrid web applications for high-profile clients.
    highlights:
      - "Product Delivery: Sole developer and architect for a premium Swift iOS application for an executive society. Separately, built an AngularJS e-commerce platform for a food distributor with automated deployment via Octopus Deploy, and architected reusable WebView components to share data visualization across native mobile platforms for a wealth management client."
    start_date: April 2014
    end_date: July 2015
  - role: Technical Analyst
    company: Solstice Mobile
    location: Chicago, IL
    description: Delivered core mobile features for financial services clients.
    highlights:
      - "Financial Services Engineering: Delivered core mobile features for a large financial services client in 4-week sprints, including Photo Check Deposit, Scheduled Payments and a complete home screen refactor using Auto Layout."
    start_date: June 2013
    end_date: April 2014
