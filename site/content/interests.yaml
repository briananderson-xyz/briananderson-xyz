  - id: "outside-work"
    name: "Outside Work"
    description: "When I'm not shipping software."
    type: "text"
    items:
      - heading: "Family"
        body: "Dad first. Everything else is secondary."
      - heading: "Running"
        body: "Half marathons mostly. Slower than I'd like, consistent enough to matter."
      - heading: "Hardware & Tinkering"
        body: "I built my first gaming PC years ago and never really stopped. GamersNexus is in my YouTube for a reason."
      - heading: "Reading"
        body: "Mostly non-fiction — systems thinking, organizational design, and the occasional deep-dive into something completely unrelated to tech."
