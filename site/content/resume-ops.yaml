  - role: Senior Technical Principal
    company: Kin + Carta
    location: Denver, CO
    description: Led CI/CD platform engineering at Discover Financial and infrastructure standardization at Gordon Food Service.
    highlights:
      - text: "CI/CD & Platform Engineering (Discover Financial): Led the integration layer for the Trident pipeline, a standardized CI/CD framework spanning 5,000+ applications. Defined Golden Paths and integration playbooks for production adoption, identified gaps in monitoring and observability, implemented AWS integration via Kubernetes Operators, and established deployment strategies (canary, blue/green). Resulted in a 90% reduction in deployment lead time."
        link: /projects/discover-trident/
      - text: "Infrastructure as Code (Gordon Food Service): Developed a comprehensive library of shared Terraform Modules and Liquibase patterns to centralize product provisioning, ensuring infrastructure consistency, automated security compliance, budgetary guardrails, and CI/CD templates across GitLab, SonarCloud, NexusIQ, and Apigee to enable rapid, secure deployment cycles across all enterprise product teams."
        link: /projects/gfs-cloud-enablement/
      - text: "Data Modernization (Gordon Food Service): Built ICDS (Integrated Consumption Data Store), normalizing fragmented data sources into a centralized BigQuery repository with Dataflow batch pipelines and a standardized API layer on GKE, eliminating duplicated data dependencies across consumer applications."
        link: /projects/gfs-cloud-enablement/
    start_date: February 2020
    end_date: March 2024
