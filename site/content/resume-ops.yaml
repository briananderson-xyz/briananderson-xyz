tagline: >
  Platform and reliability architect focused on cloud-native delivery, paved-road automation,
  and observability for both traditional services and AI agent workloads.
mission: Driving operational excellence and engineering velocity through platform automation, reliability engineering, and Agentic AI.
email: brian@briananderson.xyz
location: Denver, CO
summary: >
  Platform engineering has always been about one thing: making the path to production reliable
  enough that teams stop thinking about it. Over 10 years that meant paved-road CI/CD,
  zero-downtime migrations, Kubernetes platforms for financial and e-commerce systems, and
  observability stacks that surface problems before they become incidents. AI agent workloads
  have the same failure modes as distributed systems: unpredictable behavior, cost spikes,
  silent failures. I'm applying the same instrumentation and reliability discipline to them.
