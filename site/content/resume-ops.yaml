experience:
  - role: Enterprise Solutions Architect
    company: Amazon Web Services
    location: Denver, CO
    description: Specializing in cloud-native transformation, infrastructure modernization, and platform reliability.
    highlights:
      - "Industrial IoT & Observability (ProveIT): Built a prototype for manufacturing environments that ingested MQTT data streams via a Unified Namespace (UNS) architecture, categorized and standardized stream contents into a time-series database, and integrated an Agentic AI layer using AgentCore and Bedrock for anomaly detection. Delivered persona-specific dashboards (OEE, equipment state) and natural-language querying of production line status."
      - "Customer Support Automation (Amazon Connect): Identified an operational gap for a global manufacturer and built a working prototype demonstrating multi-threaded conversation support and extended customer support hours. Personally engineered a secure SMS image-upload integration to showcase the platform's extensibility for visual troubleshooting workflows."
      - "Enterprise Infrastructure & Migration (SAP Integration): Guided a global manufacturer through architecting secure AWS infrastructure for a Document Management System integrated with SAP ERP. Established best practices for infrastructure as code, private VPC architecture with VPC endpoints, and S3 gateway patterns for scalability, resiliency, and cost efficiency at scale. Led architectural discovery to establish migration roadmaps for broader legacy-to-cloud transitions."
      - text: "AI Agent Observability (Stallion): Built a local-first AI agent platform and instrumented it with OpenTelemetry plus Prometheus/Grafana to trace agent behavior, surface cost and reliability signals, and make tool-driven workflows debuggable."
        link: /projects/stallion-agent-platform/
      - text: "Agentic Developer Tooling (Kiro): Among the top 75 most active users out of 275k+ internal Kiro CLI users. Built agent workflows for Kiro that standardized ideation-to-verification loops and used promptfoo-based evals to harden prompts and improve reliability before release."
        link: /projects/kiro-agent-workflows/
    start_date: September 2024
  - role: Technical Director
    company: Valtech | Kin + Carta
    location: Denver, CO
    description: Led zero-downtime migration of mission-critical credit card applications from legacy Websphere and Pivotal Cloud Foundry (PCF) to OpenShift (OCP on AWS).
    highlights:
      - "Zero-Downtime Migration: Orchestrated migration of 14 mission-critical Java SpringBoot credit card applications from legacy Websphere and Pivotal Cloud Foundry (PCF) to OpenShift (OCP on AWS), maintaining 100% availability throughout the transition."
      - "CI/CD Transformation: Implemented trunk-based CI/CD and TDD mandates, reducing deployment cycles from monthly releases to multiple on-demand daily deployments while maintaining strict financial sector change management compliance with ServiceNow and LeanIX."
      - "Observability Enablement: Standardized enterprise-wide integration patterns using Helm Charts, enabling consistency in application deployments and seamless adoption of Datadog and Instana for managing SLIs, SLOs, and error budgets across multiple delivery teams for unified production monitoring."
    start_date: March 2024
