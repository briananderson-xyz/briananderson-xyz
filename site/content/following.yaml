title: "Following"
description: "Creators, engineers, and thinkers worth your attention. These are the channels I actually watch."
categories:
  - name: "AI & Engineering"
    creators:
      - name: "Theo (t3.gg)"
        handle: "@t3dotgg"
        url: "https://www.youtube.com/@t3dotgg"
        description: "Opinionated takes on TypeScript, React, and the modern web stack. Stays close to production reality and doesn't shy away from calling out hype."
      - name: "Nate Jones"
        handle: "@natebjones"
        url: "https://www.youtube.com/@natebjones"
        description: "AI automation and workflows. Practical, not hype-driven. Good for seeing how AI tooling actually gets applied day-to-day."
      - name: "MLOps Community"
        handle: "@MLOps"
        url: "https://www.youtube.com/@MLOps"
        description: "ML engineering in production. Deep dives on deployment, reliability, model lifecycle, and the operational side of AI that most channels skip."
      - name: "Matthew Berman"
        handle: "@matthew_berman"
        url: "https://www.youtube.com/@matthew_berman"
        description: "Comprehensive LLM benchmarks and model reviews. Useful for staying current on what the models can actually do, not just what the press releases say."
      - name: "IndyDevDan"
        handle: "@indydevdan"
        url: "https://www.youtube.com/@indydevdan"
        description: "Hands-on AI agent development with Claude and other tools. Probably the most practical channel for actually building with agentic AI workflows."
      - name: "Jack"
        handle: "@Itssssss_Jack"
        url: "https://www.youtube.com/@Itssssss_Jack"
        description: "Short, practical AI coding workflow content. Good signal-to-noise ratio for how to use AI tools effectively without the fluff."
      - name: "Latent Space"
        handle: "@LatentSpacePod"
        url: "https://www.youtube.com/@LatentSpacePod"
        description: "Swyx and Alessio go deep on AI engineering. Essential for understanding where the field is actually heading, not just the surface-level narrative."
  - name: "Tech & Infrastructure"
    creators:
      - name: "DevOps Toolbox"
        handle: "@devopstoolbox"
        url: "https://www.youtube.com/@devopstoolbox"
        description: "DevOps tooling, Kubernetes, and platform engineering in practice. Covers the operational side of building and running systems at scale."
      - name: "GamersNexus"
        handle: "@GamersNexus"
        url: "https://www.youtube.com/@GamersNexus"
        description: "The gold standard for PC hardware reviews. Rigorous methodology, independent testing, and no sponsor-driven softballs. What good technical journalism looks like."
